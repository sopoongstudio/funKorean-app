function showSentenceCat(idx, btn) {
  const cat = l2Categories[idx];
  if (!cat) return;
  if (cat.comingSoon || !cat.sentences || cat.sentences.length === 0) {
    document.getElementById('sentence-content').innerHTML = `
      <div style="text-align:center;padding:3rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">🚧</div>
        <div style="font-family:'Noto Sans KR',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:.5rem;">${cat.cat}</div>
        <div style="font-size:.9rem;color:var(--text-muted);">${cat.desc}</div>
        <div style="margin-top:1.5rem;font-size:.85rem;color:#94A3B8;">Coming soon — 곧 업데이트될 예정이에요!</div>
      </div>`;
    return;
  }
  renderL2Category(cat);
}

function renderL2Category(cat) {
  window._activeL2Cat = cat;
  const el = document.getElementById('sentence-content');
  el.innerHTML = `
    <div style="display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:2px solid var(--border);padding-bottom:.8rem;flex-wrap:wrap;" id="l2-section-nav">
      <button class="l2-sec-btn active" onclick="switchL2Section('sentences',this)" style="background:#52b788;color:white;border:none;padding:.45rem 1rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;">📋 문장</button>
      <button class="l2-sec-btn" onclick="switchL2Section('dialogue',this)" style="background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);padding:.45rem 1rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;">💬 대화 드릴</button>
      <button class="l2-sec-btn" onclick="switchL2Section('quiz',this)" style="background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);padding:.45rem 1rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;">🧩 퀴즈</button>
    </div>
    <div id="l2-section-content"></div>`;
  renderL2Sentences(cat);
}

function switchL2Section(section, btn) {
  document.querySelectorAll('.l2-sec-btn').forEach(b=>{b.style.background='var(--surface2)';b.style.color='var(--text-muted)';b.style.border='1.5px solid var(--border)';});
  btn.style.background='#52b788';btn.style.color='white';btn.style.border='none';
  const cat = window._activeL2Cat || l2Categories[3];
  if (section==='sentences') renderL2Sentences(cat);
  else if (section==='dialogue') renderL2Dialogue(cat);
  else if (section==='quiz') renderL2Quiz(cat);
}

function renderL2Sentences(cat) {
  const el = document.getElementById('l2-section-content');

  if (cat.patterns && cat.patterns.length > 0) {
    patternsHtml = `<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem;">`;
    cat.patterns.forEach(p => {
      const cp = p.pattern.replace(/~/g,'').replace(/[?!]/g,'').trim().split('/')[0].trim();
      patternsHtml += `<div onclick="speak('${cp}')" style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:.35rem .8rem;font-size:.78rem;color:#276749;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.4rem;" onmouseover="this.style.background='#DCFCE7'" onmouseout="this.style.background='#F0FDF4'"><span style="font-family:'Noto Sans KR',sans-serif;">${p.pattern}</span><span style="color:#94A3B8;font-weight:400;">= ${p.hint}</span><span style="font-size:.7rem;color:#86EFAC;">🔊</span></div>`;
    });
    patternsHtml += `</div>`;
  }
  let sentHtml = `
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;">
      <span style="font-size:.8rem;color:var(--text-muted);font-weight:600;">Show:</span>
      <button onclick="toggleSentenceView('kr')" id="sent-btn-kr" style="background:#52b788;color:white;border:none;padding:.3rem .8rem;border-radius:99px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">🇰🇷 Korean first</button>
      <button onclick="toggleSentenceView('en')" id="sent-btn-en" style="background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);padding:.3rem .8rem;border-radius:99px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">🇬🇧 English first</button>
    </div>
    <div id="sentence-cards-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.7rem;">`;
  cat.sentences.forEach(s => {
    sentHtml += `<div class="sent-card" data-kr="${s.kr.replace(/"/g,'&quot;')}" style="background:#FAFFFE;border:1.5px solid rgba(82,183,136,.3);border-radius:14px;padding:1rem 1.1rem;cursor:pointer;transition:all .2s;" onclick="speak(this.dataset.kr)" onmouseover="this.style.borderColor='#52b788';this.style.background='#F0FDF4'" onmouseout="this.style.borderColor='rgba(82,183,136,.3)';this.style.background='#FAFFFE'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;">
        <div style="flex:1;">
          <div class="sc-kr-text" style="font-family:'Noto Sans KR',sans-serif;font-size:1.15rem;font-weight:800;color:#0F172A;margin-bottom:.2rem;">${s.kr}</div>
          <div class="sc-rom-text" style="font-size:.72rem;color:#4D96FF;margin-bottom:.15rem;">${s.rom}</div>
          <div class="sc-en-text" style="font-size:.82rem;color:#475569;">${s.en}</div>
        </div>
        <div style="font-size:1rem;color:#CBD5E1;flex-shrink:0;">🔊</div>
      </div>
    </div>`;
  });
  sentHtml += `</div>`;
  el.innerHTML = patternsHtml + sentHtml;
}

function toggleSentenceView(mode) {
  const cards = document.querySelectorAll('.sent-card');
  const btnKr = document.getElementById('sent-btn-kr'), btnEn = document.getElementById('sent-btn-en');
  if (mode==='en') {
    btnEn.style.background='#52b788';btnEn.style.color='white';btnEn.style.border='none';
    btnKr.style.background='var(--surface2)';btnKr.style.color='var(--text-muted)';btnKr.style.border='1.5px solid var(--border)';
    cards.forEach(c=>{c.querySelector('.sc-kr-text').style.display='none';c.querySelector('.sc-rom-text').style.display='none';c.querySelector('.sc-en-text').style.fontSize='1rem';c.querySelector('.sc-en-text').style.fontWeight='700';c.querySelector('.sc-en-text').style.color='#0F172A';});
  } else {
    btnKr.style.background='#52b788';btnKr.style.color='white';btnKr.style.border='none';
    btnEn.style.background='var(--surface2)';btnEn.style.color='var(--text-muted)';btnEn.style.border='1.5px solid var(--border)';
    cards.forEach(c=>{c.querySelector('.sc-kr-text').style.display='';c.querySelector('.sc-rom-text').style.display='';c.querySelector('.sc-en-text').style.fontSize='.82rem';c.querySelector('.sc-en-text').style.fontWeight='400';c.querySelector('.sc-en-text').style.color='#475569';});

}

function startDlgSpeech(expected, btn, feedbackId) {
  const resultEl = feedbackId ? document.getElementById(feedbackId) : document.getElementById('dlg-speak-result');
  const orig = '🎤';
  let mediaRecorder = null, audioChunks = [], recordingReady = false;
  let finalTranscript = '';
  let recognition = null;

  function showPlaybackResult() {
    btn.textContent = orig; btn.style.color = '#52b788';
    const pb = `<button onclick="playMyRecording(this)" style="background:var(--surface2);border:1.5px solid var(--border);color:var(--text-muted);border-radius:99px;padding:.25rem .7rem;font-size:.72rem;font-weight:600;cursor:pointer;">🔊 내 발음</button>`;
    if(finalTranscript) {
      const clean = s => s.replace(/[?!.,~\s]/g,'').toLowerCase();
      const match = clean(finalTranscript) === clean(expected);
      if(match) resultEl.innerHTML = `<div style="background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:10px;padding:.6rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;"><span style="color:#276749;font-weight:700;">✅ 잘했어요!</span><span style="font-family:'Noto Sans KR',sans-serif;color:#0F172A;">"${finalTranscript}"</span>${pb}</div>`;
      else resultEl.innerHTML = `<div style="background:#FFF8F6;border:1.5px solid rgba(255,107,107,.4);border-radius:10px;padding:.6rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;"><span style="color:#E53E3E;font-weight:700;">🔄 다시!</span><span style="font-size:.8rem;color:var(--text-muted);">You: <span style="font-family:'Noto Sans KR',sans-serif;color:#0F172A;">"${finalTranscript}"</span></span><span style="font-size:.8rem;color:var(--text-muted);">→ <span style="font-family:'Noto Sans KR',sans-serif;color:#52b788;font-weight:700;">"${expected}"</span></span>${pb}</div>`;
    } else {
      resultEl.innerHTML = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;">${pb}<span style="font-size:.75rem;color:var(--text-muted);">녹음됐어요! 들어보세요 👂</span></div>`;
    }
    if(resultEl) resultEl.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  function doRecord(stream) {
    mediaRecorder = new MediaRecorder(stream); audioChunks = []; finalTranscript = '';
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks,{type:'audio/webm'});
      window._lastRecordingUrl = URL.createObjectURL(blob);
      recordingReady = true;
      showPlaybackResult();
    };

    btn.textContent = '🎙️'; btn.style.color = '#FF6B6B';
    mediaRecorder.start();
    resultEl.innerHTML = `
      <div style="color:#FF6B6B;font-size:.88rem;font-weight:700;padding:.6rem 1rem;background:#FFF0EA;border-radius:10px;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;">
        <span>🎙️ 말하세요…</span>
        <button onclick="window._stopDlgSpeech&&window._stopDlgSpeech()" style="background:#FF6B6B;color:white;border:none;border-radius:99px;padding:.25rem .8rem;font-size:.78rem;font-weight:700;cursor:pointer;">🛑 완료</button>
      </div>`;
    if(resultEl) resultEl.scrollIntoView({behavior:'smooth', block:'nearest'});

    // Try speech recognition (optional)
    if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'ko-KR'; recognition.continuous = false; recognition.interimResults = true;
      recognition.onresult = e => {
        finalTranscript = '';
        for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)finalTranscript+=e.results[i][0].transcript;}
      };
      recognition.onend = () => {
        if(mediaRecorder && mediaRecorder.state==='recording') {
          setTimeout(()=>{ try{recognition.start();}catch(e){} },300);
        }
      };
      recognition.onerror = e => { if(e.error==='no-speech') return; };
      try { recognition.start(); } catch(e) {}
    }
  }

  window._stopDlgSpeech = () => {
    if(recognition){ try{recognition.stop();}catch(e){} }
    if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
  };

  if(window._micStream && window._micStream.active) {
    doRecord(window._micStream);
  } else {
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
      window._micStream = stream;
      doRecord(stream);
    }).catch(() => {
      btn.textContent = orig; btn.style.color = '#52b788';
      if(resultEl) resultEl.innerHTML = `<div style="color:#F59E0B;font-size:.82rem;padding:.5rem 1rem;background:#FEF3C7;border-radius:10px;margin-bottom:.5rem;">⚠️ 마이크 권한이 필요해요.</div>`;
    });
  }
}

function playFullDialogue(dIdx) {
  const cat = window._activeL2Cat || l2Categories[3];
  const lines = cat.dialogues[dIdx].lines;
  let i = 0;
  function playNext() {
    if (i >= lines.length) return;
    const u = new SpeechSynthesisUtterance(lines[i].kr.replace(/~/g,''));
    u.lang = 'ko-KR'; u.rate = 0.85; u.pitch = 1;
    u.onend = () => { i++; playNext(); };
    window.speechSynthesis.speak(u);
  }
  window.speechSynthesis.cancel();
  playNext();
}

function playMyRecording(btn) {
  if (!window._lastRecordingUrl) return;
  const audio = new Audio(window._lastRecordingUrl); audio.play();
  if (btn) { const orig=btn.textContent; btn.textContent='▶ 재생 중...'; audio.onended=()=>btn.textContent=orig; }
}

// DYNAMIC QUIZ
function generateL2Quiz(cat) {
  const allKr = [];
  cat.sentences.forEach(s=>allKr.push(s.kr));
  cat.dialogues.forEach(dlg=>dlg.lines.forEach(l=>{if(!allKr.includes(l.kr))allKr.push(l.kr);}));
  function makeWrongs(correct){return shuffleArr(allKr.filter(k=>k!==correct)).slice(0,3);}
  const typeA = shuffleArr([...cat.sentences]).slice(0,4).map(s=>({type:'A',prompt:s.en,answer:s.kr,options:shuffleArr([s.kr,...makeWrongs(s.kr)]),answerRom:s.rom}));
  const cCandidates=[];
  cat.dialogues.forEach(dlg=>dlg.lines.forEach((line,i)=>{if(line.isMe&&i>0)cCandidates.push({line,prevLine:dlg.lines[i-1]});}));
  const typeC = shuffleArr(cCandidates).slice(0,2).map(c=>({type:'C',context:`${c.prevLine.speaker}: "${c.prevLine.kr}"`,contextEn:c.prevLine.en,prompt:c.line.en,answer:c.line.kr,options:shuffleArr([c.line.kr,...makeWrongs(c.line.kr)]),answerRom:c.line.rom}));
  return shuffleArr([...typeA,...typeC]);
}

let l2QuizState = {idx:0,score:0,answered:false,shuffled:[]};

function renderL2Quiz(cat) {
  l2QuizState = {idx:0,score:0,answered:false,shuffled:generateL2Quiz(cat)};
  document.getElementById('l2-section-content').innerHTML = `<div id="l2-quiz-inner"></div>`;
  showL2Question();
}

function showL2Question() {
  const el = document.getElementById('l2-quiz-inner');
  const q = l2QuizState.shuffled[l2QuizState.idx];
  const total = l2QuizState.shuffled.length;
  let promptBox = '';
  if (q.type==='C'&&q.context) {
    promptBox = `<div style="background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:12px;padding:1rem 1.2rem;margin-bottom:.8rem;text-align:left;"><div style="font-size:.68rem;color:#3B82F6;letter-spacing:1px;text-transform:uppercase;margin-bottom:.4rem;">💬 상황 Context</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;color:#1E293B;margin-bottom:.2rem;">${q.context}</div><div style="font-size:.78rem;color:#64748B;">${q.contextEn}</div></div><div style="background:var(--surface2);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1rem;"><div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.5rem;">How do you respond?</div><div style="font-size:1.1rem;font-weight:600;color:var(--text);">${q.prompt}</div></div>`;
  } else {
    promptBox = `<div style="background:var(--surface2);border-radius:14px;padding:1.5rem;margin-bottom:1rem;"><div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.8rem;">How do you say this in Korean?</div><div style="font-size:1.4rem;font-weight:700;color:var(--text);">${q.prompt}</div></div>`;
  }
  el.innerHTML = `
    <div style="text-align:center;margin-bottom:1rem;">
      <div style="font-size:.75rem;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:.3rem;">문제 ${l2QuizState.idx+1} / ${total}</div>
      ${promptBox}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1rem;" id="l2-quiz-opts">
      ${q.options.map(opt=>`<button onclick="answerL2Quiz('${opt.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}',this)" style="background:var(--surface2);border:2px solid var(--border);color:var(--text);padding:1rem .8rem;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4;" onmouseover="if(!this.disabled){this.style.borderColor='#52b788';this.style.background='#F0FDF4'}" onmouseout="if(!this.disabled){this.style.borderColor='var(--border)';this.style.background='var(--surface2)'}">${opt}</button>`).join('')}
    </div>
    <div id="l2-quiz-feedback" style="min-height:2rem;text-align:center;margin-bottom:.8rem;"></div>
    <div style="text-align:center;"><button id="l2-quiz-next" onclick="nextL2Question()" style="display:none;background:#52b788;color:white;border:none;padding:.7rem 2rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;font-size:.9rem;">다음 →</button></div>`;
}

function answerL2Quiz(chosen, correct, btn) {
  if (l2QuizState.answered) return;
  l2QuizState.answered = true;
  const q = l2QuizState.shuffled[l2QuizState.idx];
  document.querySelectorAll('#l2-quiz-opts button').forEach(b=>{b.disabled=true;b.onmouseover=null;b.onmouseout=null;if(b.textContent.trim()===correct){b.style.background='rgba(82,183,136,.2)';b.style.borderColor='#52b788';b.style.color='#276749';}});
  const fb = document.getElementById('l2-quiz-feedback');
  const romHint = q.answerRom ? `<div style="font-size:.75rem;color:#4D96FF;margin-top:.3rem;">${q.answerRom}</div>` : '';
  if (chosen.trim()===correct.trim()) {
    l2QuizState.score++;
    btn.style.background='rgba(82,183,136,.2)';btn.style.borderColor='#52b788';btn.style.color='#276749';
    fb.innerHTML = `<span style="color:#276749;font-weight:700;">✅ 정답! Correct!</span>${romHint}`;
    speak(correct);
  } else {
    btn.style.background='rgba(255,107,107,.1)';btn.style.borderColor='#FF6B6B';btn.style.color='#E53E3E';
    fb.innerHTML = `<span style="color:#E53E3E;font-weight:700;">✗</span> <span style="font-family:'Noto Sans KR',sans-serif;font-size:1rem;color:#52b788;font-weight:700;">${correct}</span>${romHint}`;
    speak(correct);
  }
  document.getElementById('l2-quiz-next').style.display = 'inline-block';
}

function nextL2Question() {
  l2QuizState.idx++; l2QuizState.answered = false;
  if (l2QuizState.idx >= l2QuizState.shuffled.length) showL2QuizScore();
  else showL2Question();
}

function showL2QuizScore() {
  const score=l2QuizState.score,total=l2QuizState.shuffled.length,pct=score/total;
  const label=pct<.5?'화이팅! 💪 Keep going!':pct<.8?'잘했어요! 😊 Good job!':pct<1?'훌륭해요! 🎉 Great work!':'완벽해요! 🌟 Perfect!';
  document.getElementById('l2-quiz-inner').innerHTML = `<div style="text-align:center;padding:2rem 1rem;"><div style="font-size:4rem;font-weight:700;color:#52b788;margin-bottom:.5rem;">${score}/${total}</div><div style="color:var(--text-muted);font-size:1rem;margin-bottom:1.5rem;">${label}</div><div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;"><button onclick="renderL2Quiz(window._activeL2Cat||l2Categories[3])" style="background:#FF6B6B;color:white;border:none;padding:.8rem 2rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;">↺ 다시 도전</button><button onclick="switchL2Section('sentences',document.querySelector('.l2-sec-btn'))" style="background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:.8rem 1.5rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;">← 문장으로</button></div></div>`;
}


// Init — show first category on load
document.addEventListener('DOMContentLoaded', () => {
  showSentenceCat(0, document.getElementById('sentence-tabs'));
});
</script>
