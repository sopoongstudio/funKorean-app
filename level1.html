  '☀️ Time of Day 하루':[{emoji:'🌙',kr:'새벽',rom:'sae-byeok',en:'dawn / early morning'},{emoji:'🌅',kr:'아침',rom:'a-chim',en:'morning'},{emoji:'☀️',kr:'점심',rom:'jeom-sim',en:'noon / lunch time'},{emoji:'🌤️',kr:'오후',rom:'o-hu',en:'afternoon'},{emoji:'🌆',kr:'저녁',rom:'jeo-nyeok',en:'evening'},{emoji:'🌙',kr:'밤',rom:'bam',en:'night'},{emoji:'🌑',kr:'자정',rom:'ja-jeong',en:'midnight'}],
  '📆 Dates & Time 날짜·기간':[{emoji:'📆',kr:'그저께',rom:'geu-jeo-kke',en:'the day before yesterday'},{emoji:'⬅️',kr:'어제',rom:'eo-je',en:'yesterday'},{emoji:'📍',kr:'오늘',rom:'o-neul',en:'today'},{emoji:'➡️',kr:'내일',rom:'nae-il',en:'tomorrow'},{emoji:'⏱️',kr:'지금',rom:'ji-geum',en:'now'},{emoji:'🏖️',kr:'주말',rom:'ju-mal',en:'weekend'},{emoji:'🔁',kr:'매일',rom:'mae-il',en:'every day'},{emoji:'📅',kr:'이번 주',rom:'i-beon ju',en:'this week'},{emoji:'⏭️',kr:'다음 주',rom:'da-eum ju',en:'next week'}],
};
const vocabCategories={
  vocab:['👨‍👩‍👧 Family 가족','💼 Jobs 직업','🏫 Places 장소','🍎 Food 음식','🎨 Colors 색깔','😊 Feelings 감정','🚂 Transport 교통','🏠 Home 집','👕 Clothes 옷','🌡️ Weather 날씨','🐶 Animals 동물','📱 Objects 물건','🏥 Body 신체'],
  numbers:['🔢 Native Numbers 고유어','🔢 Sino Numbers 한자어','🏅 Ordinal Numbers 서수'],
  time:['🌸 Seasons 계절','📅 Days of the Week 요일','☀️ Time of Day 하루','📆 Dates & Time 날짜·기간'],
};
let currentVocabMain='vocab';

function switchVocabMain(type){
  currentVocabMain=type;
  const vBtn=document.getElementById('main-tab-vocab'),nBtn=document.getElementById('main-tab-numbers'),tBtn=document.getElementById('main-tab-time');
  [vBtn,nBtn,tBtn].forEach(b=>{if(b){b.style.background='var(--surface2)';b.style.borderColor='var(--border)';b.style.color='var(--text-muted)';}});
  if(type==='vocab'){vBtn.style.background='#FF6B6B';vBtn.style.borderColor='#FF6B6B';vBtn.style.color='white';}
  else if(type==='numbers'){nBtn.style.background='#10B981';nBtn.style.borderColor='#10B981';nBtn.style.color='white';}
  else if(type==='time'){tBtn.style.background='#8B5CF6';tBtn.style.borderColor='#8B5CF6';tBtn.style.color='white';}
  const cats=vocabCategories[type];
  const tabs=document.getElementById('vocab-tabs');
  tabs.innerHTML=cats.map((c)=>`<option value="${c.replace(/"/g,'&quot;')}">${c}</option>`).join('');
  showVocabCat(cats[0],tabs);
}
function showVocabCat(cat,btn){
  const words=vocabData[cat]||[];
  const pdfMap={
    '👨‍👩‍👧 Family 가족':'family_flashcards.pdf','💼 Jobs 직업':'jobs_flashcards.pdf','🏫 Places 장소':'places_flashcards.pdf',
    '🍎 Food 음식':'food_flashcards.pdf','🌸 Seasons 계절':'seasons_flashcards.pdf','🎨 Colors 색깔':'colors_flashcards.pdf',
    '😊 Feelings 감정':'feelings_flashcards.pdf','🚂 Transport 교통':'transport_flashcards.pdf','🏠 Home 집':'home_flashcards.pdf',
    '👕 Clothes 옷':'clothes_flashcards.pdf','🌡️ Weather 날씨':'weather_flashcards.pdf','🐶 Animals 동물':'animals_flashcards.pdf',
    '📱 Objects 물건':'objects_flashcards.pdf','🏥 Body 신체':'body_flashcards.pdf',
  };
  const pdf=pdfMap[cat];
  let pdfEl=document.getElementById('vocab-pdf-btn');
  pdfEl.innerHTML=pdf?`<div style="margin-top:.5rem;margin-bottom:1rem;padding:.8rem 1rem;background:#F0F9FF;border:1.5px solid #BAE6FD;border-radius:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;"><span style="font-size:.83rem;color:#0369A1;">📋 이 카테고리의 플래시카드를 인쇄해서 연습해보세요!</span><a href="${pdf}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:.5rem;background:#fff;border:1.5px solid #CBD5E1;color:#475569;text-decoration:none;padding:.45rem 1.1rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.05);">🖨️ 플래시카드 Flashcards</a></div>`:'';
  document.getElementById('vocab-cards').innerHTML=words.map(w=>`<div class="vocab-card" onclick="speak('${w.kr}')"><span class="vc-emoji">${w.emoji}</span><span class="vc-kr">${w.kr}</span><div class="vc-rom">${w.rom}</div><div class="vc-en">${w.en}</div><div class="vc-sound-hint">🔊</div></div>`).join('');
}

// Init
switchVocabMain('vocab');
</script>
